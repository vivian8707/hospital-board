<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>溝通板 Communication Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }

  :root {
    --c-bg:        #f3efe6;
    --c-display:   #161e2e;
    --c-text:      #161e2e;
    --c-text-soft: #6b7591;
    --c-card:      #ffffff;
    --c-cream:     #fef3d8;
    --c-cream-bd:  #f1d99a;
    --c-mint:      #d4f0d4;
    --c-mint-bd:   #8fc78f;
    --c-peach:     #fde2d4;
    --c-peach-bd:  #f0b894;
    --c-pink:      #fbd9e0;
    --c-pink-bd:   #e89cae;
    --c-border:    #e5e0d3;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    overflow: hidden;
    touch-action: manipulation;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 10px;
    gap: 10px;
  }

  /* ===== Display ===== */
  .display {
    flex: 0 0 22%;
    background: var(--c-display);
    color: #fff;
    border-radius: 12px;
    padding: 14px 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .display-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #8a93a8;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .display-text {
    font-size: clamp(2rem, 5.5vw, 4rem);
    font-weight: 700;
    line-height: 1.15;
    word-break: break-word;
    white-space: pre-wrap;
    max-height: 100%;
    overflow-y: auto;
    color: #fff;
  }

  .display-text.empty {
    color: #6b7591;
    font-style: italic;
    font-weight: 500;
  }

  /* ===== Phrases ===== */
  .phrases {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .phrase-btn {
    padding: 12px 6px;
    border: 1.5px solid var(--c-cream-bd);
    border-radius: 10px;
    background: var(--c-cream);
    color: var(--c-text);
    font-size: clamp(0.85rem, 1.5vw, 1.15rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    min-height: 50px;
    line-height: 1.2;
  }

  .phrase-btn:active,
  .phrase-btn.pressed {
    transform: translateY(2px);
    filter: brightness(0.94);
  }

  /* ===== Keyboard ===== */
  .keyboard {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .key-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .key {
    border: 1.5px solid var(--c-border);
    border-radius: 14px;
    background: var(--c-card);
    color: var(--c-text);
    font-size: clamp(1.6rem, 4.2vw, 3rem);
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 0 rgba(0,0,0,0.04);
    min-height: 56px;
    line-height: 1;
  }

  .key:active,
  .key.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(0.94);
  }

  /* Control keys on row 5 */
  .key.bilingual {
    font-size: clamp(0.85rem, 1.6vw, 1.1rem);
    font-weight: 700;
    gap: 2px;
  }
  .key.bilingual .zh {
    font-size: 1em;
    font-weight: 800;
  }
  .key.bilingual .en {
    font-size: 0.85em;
    color: var(--c-text-soft);
    font-weight: 600;
  }

  .key.space    { background: var(--c-mint);  border-color: var(--c-mint-bd); }
  .key.back     { background: var(--c-peach); border-color: var(--c-peach-bd); font-size: 1.6rem; }
  .key.back .icon { font-size: 1.3em; }
  .key.clear-k  { background: var(--c-pink);  border-color: var(--c-pink-bd); }

  .key.speak    {
    background: var(--c-mint);
    border-color: var(--c-mint-bd);
  }
  .key.speak.playing {
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(143, 199, 143, 0.6); }
    50%      { box-shadow: 0 0 0 10px rgba(143, 199, 143, 0); }
  }

  /* Row 5 column layout: Y Z [Space] [Speak] [Back] [Clear] */
  .key-row.r5 {
    grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr 1fr;
  }

  /* Tablet portrait / phone */
  @media (max-width: 720px) {
    .app { padding: 6px; gap: 6px; }
    .display { padding: 10px 14px; flex-basis: 18%; }
    .phrases { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .phrase-btn { min-height: 48px; padding: 10px 4px; }
    .keyboard { gap: 6px; }
    .key-row { gap: 6px; }
    .key { min-height: 46px; border-radius: 10px; }
    .key.bilingual { font-size: 0.85rem; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .display { flex-basis: 20%; }
    .phrase-btn { min-height: 40px; padding: 6px 4px; }
    .key { min-height: 36px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="display">
    <div class="display-label">目前訊息 CURRENT MESSAGE</div>
    <div class="display-text empty" id="display">(請按下方按鍵開始輸入)</div>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="keyboard" id="keyboard">
    <div class="key-row" data-letters="ABCDEF"></div>
    <div class="key-row" data-letters="GHIJKL"></div>
    <div class="key-row" data-letters="MNOPQR"></div>
    <div class="key-row" data-letters="STUVWX"></div>
    <div class="key-row r5" data-letters="YZ"></div>
  </div>
</div>

<script>
  const phrases = [
    "Never mind…",
    "but",
    "because",
    "it's fine",
    "teacher",
    "class",
    "I want to eat",
    "I want to speak",
    "I want to walk",
    "I miss…"
  ];

  const display = document.getElementById("display");
  const phrasesEl = document.getElementById("phrases");
  const PLACEHOLDER = "(請按下方按鍵開始輸入)";

  let text = "";

  function render() {
    if (text === "") {
      display.textContent = PLACEHOLDER;
      display.classList.add("empty");
    } else {
      display.textContent = text;
      display.classList.remove("empty");
    }
  }

  function flashPress(el) {
    el.classList.add("pressed");
    setTimeout(() => el.classList.remove("pressed"), 120);
  }

  function appendPhrase(value) {
    const needsSpace = text.length > 0 && !text.endsWith(" ") && !/^[.,!?…]/.test(value);
    text += (needsSpace ? " " : "") + value + " ";
    render();
  }
  function appendLetter(L) { text += L; render(); }
  function appendSpace() {
    if (!text.endsWith(" ") && text.length > 0) { text += " "; render(); }
  }
  function backspace() { text = text.slice(0, -1); render(); }
  function clearAll() { text = ""; render(); }

  // Phrases
  phrases.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "phrase-btn";
    btn.type = "button";
    btn.textContent = p;
    btn.addEventListener("click", () => { flashPress(btn); appendPhrase(p); });
    phrasesEl.appendChild(btn);
  });

  // Letter rows
  document.querySelectorAll(".key-row").forEach(row => {
    row.dataset.letters.split("").forEach(L => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.type = "button";
      btn.textContent = L;
      btn.addEventListener("click", () => { flashPress(btn); appendLetter(L); });
      row.appendChild(btn);
    });
  });

  // Helper to build bilingual control key
  function makeCtrlKey(extraClass, zh, en, onClick, icon) {
    const btn = document.createElement("button");
    btn.className = "key bilingual " + extraClass;
    btn.type = "button";
    if (icon) {
      const i = document.createElement("span");
      i.className = "icon";
      i.textContent = icon;
      btn.appendChild(i);
    }
    if (zh) {
      const z = document.createElement("span");
      z.className = "zh";
      z.textContent = zh;
      btn.appendChild(z);
    }
    if (en) {
      const e = document.createElement("span");
      e.className = "en";
      e.textContent = en;
      btn.appendChild(e);
    }
    btn.addEventListener("click", () => { flashPress(btn); onClick(); });
    return btn;
  }

  const r5 = document.querySelector(".key-row.r5");
  const spaceBtn  = makeCtrlKey("space",   "空白",  "Space",  appendSpace);
  const speakBtn  = makeCtrlKey("speak",   "唸出來", "Speak", speakText);
  const backBtnEl = makeCtrlKey("back",    "",      "",      backspace, "⌫");
  const clearBtn  = makeCtrlKey("clear-k", "清除",  "Clear",  clearAll);
  r5.appendChild(spaceBtn);
  r5.appendChild(speakBtn);
  r5.appendChild(backBtnEl);
  r5.appendChild(clearBtn);

  // Speech
  function speakText() {
    if (!text.trim()) return;
    if (!("speechSynthesis" in window)) { alert("此瀏覽器不支援語音播放"); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const en = voices.find(v => /^en/i.test(v.lang));
    if (en) u.voice = en;
    u.rate = 0.9; u.pitch = 1;
    u.onstart = () => speakBtn.classList.add("playing");
    u.onend   = () => speakBtn.classList.remove("playing");
    u.onerror = () => speakBtn.classList.remove("playing");
    window.speechSynthesis.speak(u);
  }
  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
    window.speechSynthesis.getVoices();
  }

  // Physical keyboard fallback (desktop testing)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") { e.preventDefault(); backBtnEl.click(); return; }
    if (e.key === "Escape")    { clearBtn.click(); return; }
    if (e.key === " ")         { e.preventDefault(); spaceBtn.click(); return; }
    if (/^[a-zA-Z]$/.test(e.key)) {
      const L = e.key.toUpperCase();
      const btn = [...document.querySelectorAll(".key-row .key")].find(b => b.textContent === L);
      if (btn) btn.click();
    }
  });

  render();
</script>
</body>
</html>
