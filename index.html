<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>溝通板 · Cory's Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none; }

  :root {
    --ink:       #2b3a4a;
    --ink-soft:  #8a96a8;
    --line:      #e6e3d8;
    --card:      #ffffff;

    --phrase:    #fff6dc;
    --phrase-bd: #f3dfa6;
    --fav:       #fff1c4;
    --fav-bd:    #ddbc6d;
    --fav-icon:  #d97757;
    --starter:   #e6f3ff;
    --starter-bd:#b9dcf6;

    --speak:     #e8e1f5;
    --speak-bd:  #b6a7d8;
    --clear:     #fbdee2;
    --clear-bd:  #ecaab4;
    --space:     #eef1f4;
    --space-bd:  #cdd5de;

    --app-bg:    #fbfaf6;

    --shadow:      0 1px 3px rgba(60, 50, 80, .08), 0 6px 18px rgba(60, 50, 80, .08);
    --shadow-soft: 0 1px 0 rgba(60, 50, 80, .1), 0 2px 6px rgba(60, 50, 80, .06);

    --gap: 12px;
    --pad: 14px;
    --radius: 18px;
  }

  html, body {
    height: 100%;
    font-family: "PingFang TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont,
                 "Segoe UI", sans-serif;
    color: var(--ink);
    overflow: hidden;
    touch-action: manipulation;
    background: var(--app-bg);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: var(--pad);
    gap: var(--gap);
    background: var(--app-bg);
  }

  /* ───── Top strip: display + 4 starter phrases ───── */
  .top-strip {
    flex: 0 0 auto;
    min-height: 78px;
    display: flex;
    gap: var(--gap);
  }

  .display {
    flex: 0 1 33%;
    background: var(--card);
    border: 1.5px solid var(--line);
    border-radius: var(--radius);
    padding: 6px 18px;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
    min-height: 64px;
    max-height: 96px;
    transition: box-shadow .2s;
  }
  .display.listening {
    box-shadow: 0 0 0 3px rgba(184, 232, 212, .9);
  }

  .display-text {
    font-size: clamp(1.4rem, 2.4vw, 2rem);
    font-weight: 700;
    line-height: 1.2;
    word-break: break-word;
    white-space: pre-wrap;
    max-height: 100%;
    overflow-y: auto;
    width: 100%;
  }

  .display.empty .display-text {
    color: #c2cbd6;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(1.05rem, 1.7vw, 1.4rem);
  }

  .top-phrases {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
    min-width: 0;
  }
  .top-phrases .phrase-btn {
    font-size: clamp(1.15rem, 1.9vw, 1.7rem);
    min-height: 0;
    padding: 8px 6px;
  }

  /* ───── Phrase grid ───── */
  .phrases {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: minmax(78px, 1fr);
    gap: var(--gap);
    max-height: 42vh;
    overflow-y: auto;
  }

  .phrase-btn {
    position: relative;
    border: 1.5px solid var(--phrase-bd);
    background: var(--phrase);
    color: var(--ink);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: clamp(1.4rem, 2.3vw, 1.95rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform .07s, filter .12s, box-shadow .12s;
    box-shadow: var(--shadow-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px 14px;
    line-height: 1.2;
  }

  .phrase-btn.starter {
    background: var(--starter);
    border-color: var(--starter-bd);
    font-weight: 800;
  }

  .phrase-btn.custom {
    background: var(--fav);
    border-color: var(--phrase-bd);
  }

  .phrase-btn:active,
  .phrase-btn.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(.96);
  }

  .phrase-text { display: inline-block; text-wrap: pretty; }

  .phrase-del {
    position: absolute;
    top: 6px; right: 6px;
    min-width: 30px;
    height: 30px;
    padding: 0 10px;
    border-radius: 15px;
    background: rgba(43, 58, 74, .22);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background .15s, transform .15s;
    cursor: pointer;
  }
  .phrase-del.armed {
    background: #e25a6e;
    font-size: .85rem;
    transform: scale(1.05);
  }

  /* ───── Keyboard ───── */
  .keyboard {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    gap: var(--gap);
    min-height: 0;
  }

  .key-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: var(--gap);
    min-height: 0;
  }
  /* Last row: Y Z ♥ Space Clear Speak */
  .key-row.r-last {
    grid-template-columns: repeat(2, 1fr) 1fr 1.6fr 1.6fr 1.6fr;
  }

  .key {
    border: 1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    border-radius: var(--radius);
    font-family: inherit;
    font-size: clamp(2.2rem, 5.2vw, 4rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform .07s, filter .12s, box-shadow .12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-soft);
    line-height: 1;
    min-height: 60px;
  }

  .key:active,
  .key.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(.96);
  }

  .key.fav {
    background: var(--fav);
    border-color: var(--fav-bd);
    flex-direction: row;
    gap: 14px;
  }
  .key.fav.small {
    gap: 0;
    font-size: clamp(1.8rem, 3.2vw, 2.8rem);
  }
  .fav-heart { font-size: 1em; color: var(--fav-icon); }

  .key.fav.flash { animation: fav-flash .55s ease-out; }
  @keyframes fav-flash {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12); background: #ffd95c; }
    100% { transform: scale(1); }
  }

  /* ───── Control keys (keyboard last row) ───── */
  .key.ctrl {
    font-size: clamp(1.4rem, 2.4vw, 2.1rem);
    font-weight: 700;
    gap: 6px;
    padding: 8px 6px;
    flex-direction: row;
  }
  .key.ctrl .ctrl-icon { font-size: clamp(1.6rem, 3.4vw, 44px); line-height: 1; }
  .key.ctrl .ctrl-label { font-size: clamp(1.3rem, 4vw, 48px); font-weight: 700; }

  .key.ctrl.space { background: var(--space); border-color: var(--space-bd); }
  .key.ctrl.clear { background: var(--clear); border-color: var(--clear-bd); }
  .key.ctrl.speak { background: var(--speak); border-color: var(--speak-bd); }

  .key.ctrl.speak.playing { animation: pulse 1.1s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(182, 167, 216, .65); }
    50%      { box-shadow: 0 0 0 14px rgba(182, 167, 216, 0); }
  }

  /* ───── Responsive: portrait tablet / phone ───── */
  @media (max-width: 820px) {
    .app { padding: 8px; gap: 8px; }
    .display { padding: 4px 12px; min-height: 44px; max-height: 60px; }
    .top-strip { min-height: 56px; }
    .key { min-height: 48px; font-size: 2rem; }
    .key.ctrl .ctrl-icon { font-size: 1.5rem; }
    .key.ctrl .ctrl-label { font-size: .95rem; }
    .phrase-btn { font-size: 1.2rem; padding: 6px 10px; }
  }

  @media (orientation: landscape) and (max-height: 560px) {
    .display { min-height: 40px; max-height: 56px; }
    .phrases { max-height: 30vh; }
    .key { min-height: 40px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-strip">
    <div class="display empty" id="display">
      <div class="display-text" id="display-text">Dear Cory, want to say something?</div>
    </div>
    <div class="top-phrases" id="top-phrases"></div>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="keyboard" id="keyboard">
    <div class="key-row" data-letters="ABCDEF"></div>
    <div class="key-row" data-letters="GHIJKL"></div>
    <div class="key-row" data-letters="MNOPQR"></div>
    <div class="key-row" data-letters="STUVWX"></div>
    <div class="key-row r-last" data-letters="YZ"></div>
  </div>
</div>

<script>
  "use strict";

  const TOP_PHRASES = [
    { text: "I want to", starter: true },
    { text: "I miss…",   starter: true },
    { text: "I feel…",   starter: true },
    { text: "I need…",   starter: true }
  ];

  const DEFAULT_PHRASES = [
    { text: "Never mind…" },
    { text: "but" },
    { text: "because" },
    { text: "it's fine" },
    { text: "teacher" },
    { text: "class" },
    { text: "speak" },
    { text: "eat" },
    { text: "walk" }
  ];

  const STORAGE_KEY = "hospitalBoard.customPhrases.v2";
  const OLD_STORAGE_KEY = "hospitalBoard.customPhrases.v1";
  const PLACEHOLDER = "Dear Cory, want to say something?";

  // ── Custom (favorite) phrases ──
  function loadCustom() {
    try {
      let raw = localStorage.getItem(STORAGE_KEY);
      if (raw == null) {
        // migrate favorites saved by the earlier build so nothing is lost
        const old = localStorage.getItem(OLD_STORAGE_KEY);
        if (old != null) { localStorage.setItem(STORAGE_KEY, old); raw = old; }
      }
      const v = JSON.parse(raw || "[]");
      return Array.isArray(v) ? v : [];
    } catch (e) { return []; }
  }
  let custom = loadCustom();
  function saveCustom() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(custom)); } catch (e) {}
  }

  // ── Voice selection (warm female English voices) ──
  const PREFERRED_VOICES = [
    "Samantha",
    "Ava (Premium)", "Ava (Enhanced)", "Ava",
    "Allison (Premium)", "Allison",
    "Karen", "Moira", "Tessa",
    "Microsoft Aria Online (Natural)",
    "Microsoft Jenny Online (Natural)",
    "Google UK English Female",
    "Google US English"
  ];
  function pickVoice() {
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const name of PREFERRED_VOICES) {
      const v = voices.find(v => v.name === name || v.name.includes(name));
      if (v) return v;
    }
    const enFemale = voices.find(v => /^en/i.test(v.lang) && /female/i.test(v.name));
    return enFemale || voices.find(v => /^en/i.test(v.lang)) || voices[0];
  }
  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
    window.speechSynthesis.getVoices();
  }

  // ── Common English words so finished words read promptly ──
  const COMMON_WORDS = new Set((
    "a i an the be to of and in that have it for not on with he as you do at this " +
    "but his by from they we say her she or will my one all would there their what " +
    "so up out if about who get which go me when make can like time no just him know " +
    "take people into year your good some could them see other than then now look only " +
    "come over think back after use two how our work first well way even new want any " +
    "give day most us am are was were hello hi yes okay fine bad more less stop wait " +
    "yesterday today tomorrow morning afternoon evening night here please thank thanks " +
    "sorry help water food eat drink sleep tired pain hurt sick hot cold warm bathroom " +
    "toilet nurse doctor family mom dad mum mother father home love miss happy sad scared " +
    "walk speak talk listen read write play music light dark open close big small left " +
    "right down hand head leg arm back foot eye ear mouth nose phone call name teacher " +
    "class school book pen paper friend now soon later again maybe really very much feel " +
    "need mind never little better worse rest medicine pill nausea thirsty hungry blanket " +
    "pillow window door song baby son daughter wife husband sister brother grandma grandpa cory"
  ).split(/\s+/).filter(Boolean));

  // ── State + elements ──
  const displayCard = document.getElementById("display");
  const displayText = document.getElementById("display-text");
  const topPhrasesEl = document.getElementById("top-phrases");
  const phrasesEl = document.getElementById("phrases");

  let text = "";
  let typingTimer = null;
  let lastSpokenWord = "";
  let armedDel = null;
  let armTimer = null;
  let speakBtn = null;
  let favBtn = null;

  const TYPING_PAUSE_KNOWN = 1100;
  const TYPING_PAUSE_UNKNOWN = 2500;

  function render() {
    if (text === "") {
      displayText.textContent = PLACEHOLDER;
      displayCard.classList.add("empty");
    } else {
      displayText.textContent = text;
      displayCard.classList.remove("empty");
    }
  }

  function flashPress(el) {
    el.classList.add("pressed");
    setTimeout(() => el.classList.remove("pressed"), 120);
  }

  // ── Speech ──
  function speakText(what) {
    const s = (what || "").trim();
    if (!s || !("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    // lowercase so single letters / all-caps words aren't read as "capital A"
    const u = new SpeechSynthesisUtterance(s.toLowerCase());
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 0.78;   // slower = calmer, gentler
    u.pitch = 1.1;   // soft, warm
    u.volume = 0.9;  // a touch softer
    u.onstart = () => { if (speakBtn) speakBtn.classList.add("playing"); };
    u.onend   = () => { if (speakBtn) speakBtn.classList.remove("playing"); };
    u.onerror = () => { if (speakBtn) speakBtn.classList.remove("playing"); };
    window.speechSynthesis.speak(u);
  }

  // ── Auto-speak typed words after a pause ──
  function currentWord() {
    const m = text.match(/[A-Za-z]+$/);
    return m ? m[0] : "";
  }
  function cancelAutoSpeak() {
    if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
    displayCard.classList.remove("listening");
  }
  function scheduleAutoSpeak() {
    cancelAutoSpeak();
    const w = currentWord();
    if (!w) return;
    displayCard.classList.add("listening");
    const known = w.length >= 3 && COMMON_WORDS.has(w.toLowerCase());
    const delay = known ? TYPING_PAUSE_KNOWN : TYPING_PAUSE_UNKNOWN;
    typingTimer = setTimeout(() => {
      typingTimer = null;
      displayCard.classList.remove("listening");
      const word = currentWord();
      if (word && word !== lastSpokenWord) {
        speakText(word);
        lastSpokenWord = word;
      }
    }, delay);
  }

  // ── Text actions ──
  function appendPhrase(value) {
    cancelAutoSpeak();
    const needsSpace = text.length > 0 && !text.endsWith(" ") && !/^[.,!?…]/.test(value);
    text += (needsSpace ? " " : "") + value + " ";
    render();
    speakText(value);
    lastSpokenWord = "";
  }
  function appendLetter(L) {
    text += L;
    render();
    scheduleAutoSpeak();
  }
  function appendSpace() {
    if (!text.endsWith(" ") && text.length > 0) {
      cancelAutoSpeak();
      text += " ";
      lastSpokenWord = "";
      render();
    }
  }
  function backspace() {
    cancelAutoSpeak();
    text = text.slice(0, -1);
    lastSpokenWord = "";
    render();
  }
  function clearAll() {
    cancelAutoSpeak();
    text = "";
    lastSpokenWord = "";
    render();
  }

  function addToFavorites() {
    const s = text.trim();
    if (!s) return;
    if (favBtn) { favBtn.classList.add("flash"); setTimeout(() => favBtn.classList.remove("flash"), 550); }
    if (custom.includes(s)) return;
    custom.push(s);
    saveCustom();
    renderPhrases();
  }
  function removeCustom(idx) {
    if (armedDel === idx) {
      clearTimeout(armTimer);
      custom.splice(idx, 1);
      armedDel = null;
      saveCustom();
      renderPhrases();
    } else {
      armedDel = idx;
      clearTimeout(armTimer);
      renderPhrases();
      armTimer = setTimeout(() => { armedDel = null; renderPhrases(); }, 2000);
    }
  }

  // ── Builders ──
  function buildPhraseBtn(p, opts) {
    opts = opts || {};
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "phrase-btn"
      + (p.starter ? " starter" : "")
      + (opts.custom ? " custom" : "");
    const span = document.createElement("span");
    span.className = "phrase-text";
    span.textContent = p.text;
    btn.appendChild(span);
    btn.addEventListener("click", () => { flashPress(btn); appendPhrase(p.text); });

    if (opts.custom) {
      const del = document.createElement("span");
      del.setAttribute("role", "button");
      del.className = "phrase-del" + (opts.armed ? " armed" : "");
      del.textContent = opts.armed ? "確定刪？" : "×";
      del.addEventListener("click", (e) => { e.stopPropagation(); removeCustom(opts.idx); });
      btn.appendChild(del);
    }
    return btn;
  }

  function renderPhrases() {
    phrasesEl.innerHTML = "";
    DEFAULT_PHRASES.forEach(p => phrasesEl.appendChild(buildPhraseBtn(p)));
    custom.forEach((c, idx) =>
      phrasesEl.appendChild(buildPhraseBtn({ text: c }, { custom: true, idx, armed: armedDel === idx }))
    );
  }

  // Top starters
  TOP_PHRASES.forEach(p => topPhrasesEl.appendChild(buildPhraseBtn(p)));

  // Letter keys
  document.querySelectorAll(".key-row").forEach(row => {
    (row.dataset.letters || "").split("").forEach(L => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "key";
      btn.textContent = L;
      btn.addEventListener("click", () => { flashPress(btn); appendLetter(L); });
      row.appendChild(btn);
    });
  });

  // Last-row controls: ♥ favorite, Clear, Speak
  const lastRow = document.querySelector(".key-row.r-last");

  favBtn = document.createElement("button");
  favBtn.type = "button";
  favBtn.className = "key fav small";
  favBtn.title = "加為常用 / Favorite";
  favBtn.innerHTML = '<span class="fav-heart">♥</span>';
  favBtn.addEventListener("click", () => { flashPress(favBtn); addToFavorites(); });

  const spaceBtn = document.createElement("button");
  spaceBtn.type = "button";
  spaceBtn.className = "key ctrl space";
  spaceBtn.title = "空白 / Space";
  spaceBtn.innerHTML = '<span class="ctrl-icon">␣</span><span class="ctrl-label">Space</span>';
  spaceBtn.addEventListener("click", () => { flashPress(spaceBtn); appendSpace(); });

  const clearBtn = document.createElement("button");
  clearBtn.type = "button";
  clearBtn.className = "key ctrl clear";
  clearBtn.innerHTML = '<span class="ctrl-icon">✕</span><span class="ctrl-label">Clear</span>';
  clearBtn.addEventListener("click", () => { flashPress(clearBtn); clearAll(); });

  speakBtn = document.createElement("button");
  speakBtn.type = "button";
  speakBtn.className = "key ctrl speak";
  speakBtn.innerHTML = '<span class="ctrl-icon">🔊</span><span class="ctrl-label">Speak</span>';
  speakBtn.addEventListener("click", () => { flashPress(speakBtn); speakText(text); });

  lastRow.appendChild(favBtn);
  lastRow.appendChild(spaceBtn);
  lastRow.appendChild(clearBtn);
  lastRow.appendChild(speakBtn);

  // Physical keyboard (desktop testing)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") { e.preventDefault(); backspace(); return; }
    if (e.key === "Escape")    { clearAll(); return; }
    if (e.key === " ")         { e.preventDefault(); appendSpace(); return; }
    if (e.key === "Enter")     { e.preventDefault(); speakText(text); return; }
    if (/^[a-zA-Z]$/.test(e.key)) {
      const L = e.key.toUpperCase();
      const btn = [...document.querySelectorAll(".key-row .key")].find(b => b.textContent === L);
      if (btn) btn.click();
    }
  });

  renderPhrases();
  render();
</script>
</body>
</html>
