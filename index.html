<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>溝通板 Communication Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }

  :root {
    --bg:           #fbfaf6;
    --card:         #ffffff;
    --ink:          #2b3a4a;
    --ink-soft:     #8a96a8;
    --line:         #ecebe4;

    --phrase:       #fff6dc;
    --phrase-bd:    #f3dfa6;
    --phrase-hot:   #e6f3ff;
    --phrase-hot-bd:#b9dcf6;

    --space:        #e1f3e4;
    --space-bd:     #a9d8b1;
    --speak:        #e8e1f5;
    --speak-bd:     #b6a7d8;
    --fav:          #fff1c4;
    --fav-bd:       #ddbc6d;
    --back:         #fde7d6;
    --back-bd:      #f3c69e;
    --clear:        #fbdee2;
    --clear-bd:     #ecaab4;

    --shadow:       0 1px 2px rgba(60, 50, 80, 0.04), 0 4px 14px rgba(60, 50, 80, 0.05);
    --shadow-soft:  0 1px 0 rgba(60, 50, 80, 0.06);
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    touch-action: manipulation;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 14px;
    gap: 12px;
  }

  /* ===== Display ===== */
  .display {
    flex: 0 0 9%;
    background: var(--card);
    border-radius: 16px;
    padding: 8px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .display-text {
    font-size: clamp(1.3rem, 3.2vw, 2.4rem);
    font-weight: 700;
    line-height: 1.15;
    word-break: break-word;
    white-space: pre-wrap;
    max-height: 100%;
    overflow-y: auto;
    color: var(--ink);
  }

  .display-text.empty {
    color: #c2cbd6;
    font-style: italic;
    font-weight: 500;
  }

  /* ===== Phrases ===== */
  .phrases {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    max-height: 55vh;
    overflow-y: auto;
  }

  .phrase-btn {
    padding: 22px 8px;
    border: 1.5px solid var(--phrase-bd);
    border-radius: 16px;
    background: var(--phrase);
    color: var(--ink);
    font-size: clamp(1.2rem, 2vw, 1.7rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    min-height: 90px;
    line-height: 1.2;
    box-shadow: var(--shadow-soft);
    position: relative;
  }

  .phrase-btn.wide { grid-column: span 2; }

  .phrase-btn.starter {
    background: var(--phrase-hot);
    border-color: var(--phrase-hot-bd);
  }

  .phrase-btn:active,
  .phrase-btn.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(0.96);
  }

  .phrase-btn.custom {
    background: var(--space);
    border-color: var(--space-bd);
  }

  .phrase-del {
    position: absolute;
    top: 4px;
    right: 4px;
    min-width: 28px;
    height: 28px;
    padding: 0 8px;
    border-radius: 14px;
    border: none;
    background: rgba(43, 58, 74, 0.18);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.15s, transform 0.15s;
  }
  .phrase-del.armed {
    background: #e25a6e;
    font-size: 0.8rem;
    padding: 0 10px;
    transform: scale(1.05);
  }

  /* ===== Keyboard ===== */
  .keyboard {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .key-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .key {
    border: 1.5px solid var(--line);
    border-radius: 16px;
    background: var(--card);
    color: var(--ink);
    font-size: clamp(1.6rem, 4.2vw, 3rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-soft);
    min-height: 56px;
    line-height: 1;
  }

  .key:active,
  .key.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(0.96);
  }

  /* Control keys */
  .key.bilingual {
    font-size: clamp(1.25rem, 2.3vw, 1.7rem);
    font-weight: 700;
    gap: 3px;
  }
  .key.bilingual .zh { font-size: 1em; font-weight: 800; }
  .key.bilingual .en { font-size: 0.78em; color: var(--ink-soft); font-weight: 600; }
  .key.bilingual .icon { font-size: 1.6em; line-height: 1; }

  .key.speak    { background: var(--speak); border-color: var(--speak-bd); }
  .key.fav      { background: var(--fav);   border-color: var(--fav-bd);   }
  .key.clear-k  { background: var(--clear); border-color: var(--clear-bd); }

  .key.fav.flash { animation: fav-flash 0.5s ease-out; }
  @keyframes fav-flash {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.12); background: #ffd95c; }
    100% { transform: scale(1); }
  }

  .key.speak.playing { animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(182, 167, 216, 0.6); }
    50%      { box-shadow: 0 0 0 12px rgba(182, 167, 216, 0); }
  }

  /* Row 5: Y Z [Speak] [Fav] [Clear] — give letters more room, slim controls */
  .key-row.r5 {
    grid-template-columns: 1.35fr 1.35fr 1.1fr 1.1fr 1.1fr;
  }

  /* Tablet portrait / phone */
  @media (max-width: 720px) {
    .app { padding: 6px; gap: 6px; }
    .display { padding: 6px 14px; flex-basis: 7.5%; border-radius: 14px; }
    .display-text { font-size: clamp(1.05rem, 4vw, 1.8rem); }
    .phrases {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-height: 40vh;
    }
    .phrase-btn {
      min-height: 56px;
      padding: 10px 4px;
      font-size: 1.15rem;
      border-radius: 12px;
    }
    .phrase-btn.wide { grid-column: span 3; }
    .keyboard { gap: 5px; }
    .key-row { gap: 5px; }
    .key { min-height: 42px; border-radius: 10px; }
    .key.bilingual { font-size: 1.15rem; }
    .key.bilingual .en { font-size: 0.7em; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .display { flex-basis: 18%; }
    .phrase-btn { min-height: 40px; padding: 6px 4px; }
    .key { min-height: 36px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="display">
    <div class="display-text empty" id="display">Dear Cory, want to say something?</div>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="keyboard" id="keyboard">
    <div class="key-row" data-letters="ABCDEF"></div>
    <div class="key-row" data-letters="GHIJKL"></div>
    <div class="key-row" data-letters="MNOPQR"></div>
    <div class="key-row" data-letters="STUVWX"></div>
    <div class="key-row r5" data-letters="YZ"></div>
  </div>
</div>

<script>
  const DEFAULT_PHRASES = [
    { text: "Never mind…" },
    { text: "but" },
    { text: "because" },
    { text: "it's fine" },
    { text: "teacher" },
    { text: "class" },
    { text: "I want to", wide: true, starter: true },
    { text: "speak" },
    { text: "eat" },
    { text: "walk" },
    { text: "I miss…", starter: true }
  ];

  const STORAGE_KEY = "hospitalBoard.customPhrases.v1";
  let customPhrases = [];
  try {
    customPhrases = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    if (!Array.isArray(customPhrases)) customPhrases = [];
  } catch (e) { customPhrases = []; }

  function saveCustom() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(customPhrases)); } catch (e) {}
  }

  const display = document.getElementById("display");
  const phrasesEl = document.getElementById("phrases");
  const PLACEHOLDER = "Dear Cory, want to say something?";

  let text = "";

  function render() {
    if (text === "") {
      display.textContent = PLACEHOLDER;
      display.classList.add("empty");
    } else {
      display.textContent = text;
      display.classList.remove("empty");
    }
  }

  function flashPress(el) {
    el.classList.add("pressed");
    setTimeout(() => el.classList.remove("pressed"), 120);
  }

  function appendPhrase(value) {
    const needsSpace = text.length > 0 && !text.endsWith(" ") && !/^[.,!?…]/.test(value);
    text += (needsSpace ? " " : "") + value + " ";
    render();
    speakText(value);
  }
  function appendLetter(L) { text += L; render(); }
  function appendSpace() {
    if (!text.endsWith(" ") && text.length > 0) { text += " "; render(); }
  }
  function backspace() { text = text.slice(0, -1); render(); }
  function clearAll()  { text = ""; render(); }

  function buildPhraseBtn(p, isCustom, idx) {
    const btn = document.createElement("button");
    btn.className = "phrase-btn"
      + (p.wide ? " wide" : "")
      + (p.starter ? " starter" : "")
      + (isCustom ? " custom" : "");
    btn.type = "button";
    btn.textContent = p.text;
    btn.addEventListener("click", () => { flashPress(btn); appendPhrase(p.text); });

    if (isCustom) {
      const del = document.createElement("button");
      del.className = "phrase-del";
      del.type = "button";
      del.setAttribute("aria-label", "刪除");
      del.textContent = "×";
      let armTimer = null;
      del.addEventListener("click", (e) => {
        e.stopPropagation();
        if (del.classList.contains("armed")) {
          clearTimeout(armTimer);
          customPhrases.splice(idx, 1);
          saveCustom();
          renderPhrases();
        } else {
          del.classList.add("armed");
          del.textContent = "確定刪？";
          armTimer = setTimeout(() => {
            del.classList.remove("armed");
            del.textContent = "×";
          }, 2000);
        }
      });
      btn.appendChild(del);
    }
    return btn;
  }

  function renderPhrases() {
    phrasesEl.innerHTML = "";
    DEFAULT_PHRASES.forEach(p => phrasesEl.appendChild(buildPhraseBtn(p, false)));
    customPhrases.forEach((t, idx) => phrasesEl.appendChild(buildPhraseBtn({ text: t }, true, idx)));
  }

  renderPhrases();

  // Letter rows
  document.querySelectorAll(".key-row").forEach(row => {
    row.dataset.letters.split("").forEach(L => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.type = "button";
      btn.textContent = L;
      btn.addEventListener("click", () => { flashPress(btn); appendLetter(L); });
      row.appendChild(btn);
    });
  });

  function makeCtrlKey(extraClass, zh, en, onClick, icon) {
    const btn = document.createElement("button");
    btn.className = "key bilingual " + extraClass;
    btn.type = "button";
    if (icon) { const i = document.createElement("span"); i.className = "icon"; i.textContent = icon; btn.appendChild(i); }
    if (zh)   { const z = document.createElement("span"); z.className = "zh";   z.textContent = zh;   btn.appendChild(z); }
    if (en)   { const e = document.createElement("span"); e.className = "en";   e.textContent = en;   btn.appendChild(e); }
    btn.addEventListener("click", () => { flashPress(btn); onClick(); });
    return btn;
  }

  const r5 = document.querySelector(".key-row.r5");
  const speakBtn = makeCtrlKey("speak",   "唸出來", "Speak",    () => speakText(text));
  const favBtn   = makeCtrlKey("fav",     "加常用", "Favorite", addCurrentToFavorites);
  const clearBtn = makeCtrlKey("clear-k", "清除",   "Clear",    clearAll);
  r5.appendChild(speakBtn);
  r5.appendChild(favBtn);
  r5.appendChild(clearBtn);

  function addCurrentToFavorites() {
    const t = text.trim();
    if (!t) return;
    if (customPhrases.includes(t)) {
      favBtn.classList.add("flash");
      setTimeout(() => favBtn.classList.remove("flash"), 500);
      return;
    }
    customPhrases.push(t);
    saveCustom();
    renderPhrases();
    favBtn.classList.add("flash");
    setTimeout(() => favBtn.classList.remove("flash"), 500);
  }

  // Voices ranked by perceived warmth/sweetness on common platforms
  const PREFERRED_VOICES = [
    "Samantha",                                  // iOS / macOS — warm female US
    "Ava (Premium)", "Ava (Enhanced)", "Ava",    // iOS premium female
    "Allison (Premium)", "Allison",              // iOS premium female
    "Karen",                                     // iOS AU female
    "Moira",                                     // iOS IE female
    "Tessa",                                     // iOS ZA female
    "Microsoft Aria Online (Natural)",           // Edge — very natural female
    "Microsoft Jenny Online (Natural)",          // Edge — friendly female
    "Google UK English Female",
    "Google US English"
  ];

  function pickVoice() {
    const voices = window.speechSynthesis.getVoices();
    if (!voices.length) return null;
    for (const name of PREFERRED_VOICES) {
      const v = voices.find(v => v.name === name || v.name.includes(name));
      if (v) return v;
    }
    const enFemale = voices.find(v => /^en/i.test(v.lang) && /female/i.test(v.name));
    if (enFemale) return enFemale;
    return voices.find(v => /^en/i.test(v.lang)) || voices[0];
  }

  function speakText(what) {
    const t = (what || "").trim();
    if (!t) return;
    if (!("speechSynthesis" in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(t);
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 0.88;     // a touch slower for warmth
    u.pitch = 1.08;    // slightly higher for sweetness
    u.volume = 1;
    u.onstart = () => speakBtn.classList.add("playing");
    u.onend   = () => speakBtn.classList.remove("playing");
    u.onerror = () => speakBtn.classList.remove("playing");
    window.speechSynthesis.speak(u);
  }

  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
    window.speechSynthesis.getVoices();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") { e.preventDefault(); backspace(); return; }
    if (e.key === "Escape")    { clearBtn.click(); return; }
    if (e.key === " ")         { e.preventDefault(); appendSpace(); return; }
    if (e.key === "Enter")     { e.preventDefault(); speakText(text); return; }
    if (/^[a-zA-Z]$/.test(e.key)) {
      const L = e.key.toUpperCase();
      const btn = [...document.querySelectorAll(".key-row .key")].find(b => b.textContent === L);
      if (btn) btn.click();
    }
  });

  render();
</script>
</body>
</html>
