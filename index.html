<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>溝通板 Communication Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }

  :root {
    --bg:           #fbfaf6;
    --card:         #ffffff;
    --ink:          #2b3a4a;
    --ink-soft:     #8a96a8;
    --line:         #ecebe4;

    --phrase:       #fff6dc;
    --phrase-bd:    #f3dfa6;
    --phrase-hot:   #e6f3ff;
    --phrase-hot-bd:#b9dcf6;

    --space:        #e1f3e4;
    --space-bd:     #a9d8b1;
    --speak:        #e8e1f5;
    --speak-bd:     #b6a7d8;
    --back:         #fde7d6;
    --back-bd:      #f3c69e;
    --clear:        #fbdee2;
    --clear-bd:     #ecaab4;

    --shadow:       0 1px 2px rgba(60, 50, 80, 0.04), 0 4px 14px rgba(60, 50, 80, 0.05);
    --shadow-soft:  0 1px 0 rgba(60, 50, 80, 0.06);
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--ink);
    overflow: hidden;
    touch-action: manipulation;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 14px;
    gap: 12px;
  }

  /* ===== Display ===== */
  .display {
    flex: 0 0 22%;
    background: var(--card);
    border-radius: 20px;
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .display-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .display-text {
    font-size: clamp(2rem, 5.5vw, 4rem);
    font-weight: 700;
    line-height: 1.15;
    word-break: break-word;
    white-space: pre-wrap;
    max-height: 100%;
    overflow-y: auto;
    color: var(--ink);
  }

  .display-text.empty {
    color: #c2cbd6;
    font-style: italic;
    font-weight: 500;
  }

  /* ===== Phrases ===== */
  .phrases {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .phrase-btn {
    padding: 14px 8px;
    border: 1.5px solid var(--phrase-bd);
    border-radius: 14px;
    background: var(--phrase);
    color: var(--ink);
    font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    min-height: 56px;
    line-height: 1.2;
    box-shadow: var(--shadow-soft);
  }

  .phrase-btn.wide { grid-column: span 2; }

  .phrase-btn.starter {
    background: var(--phrase-hot);
    border-color: var(--phrase-hot-bd);
  }

  .phrase-btn:active,
  .phrase-btn.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(0.96);
  }

  /* ===== Keyboard ===== */
  .keyboard {
    flex: 1 1 auto;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
    gap: 10px;
    min-height: 0;
  }

  .key-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
  }

  .key {
    border: 1.5px solid var(--line);
    border-radius: 16px;
    background: var(--card);
    color: var(--ink);
    font-size: clamp(1.6rem, 4.2vw, 3rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.06s, filter 0.1s, box-shadow 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow-soft);
    min-height: 56px;
    line-height: 1;
  }

  .key:active,
  .key.pressed {
    transform: translateY(2px);
    box-shadow: none;
    filter: brightness(0.96);
  }

  /* Control keys */
  .key.bilingual {
    font-size: clamp(0.85rem, 1.5vw, 1.05rem);
    font-weight: 700;
    gap: 2px;
  }
  .key.bilingual .zh { font-size: 1em; font-weight: 800; }
  .key.bilingual .en { font-size: 0.85em; color: var(--ink-soft); font-weight: 600; }
  .key.bilingual .icon { font-size: 1.6em; line-height: 1; }

  .key.space    { background: var(--space); border-color: var(--space-bd); }
  .key.speak    { background: var(--speak); border-color: var(--speak-bd); }
  .key.back     { background: var(--back);  border-color: var(--back-bd);  }
  .key.clear-k  { background: var(--clear); border-color: var(--clear-bd); }

  .key.speak.playing { animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(182, 167, 216, 0.6); }
    50%      { box-shadow: 0 0 0 12px rgba(182, 167, 216, 0); }
  }

  /* Row 5: Y Z [Space wide] [Speak] [Back] [Clear] */
  .key-row.r5 {
    grid-template-columns: 1fr 1fr 1.5fr 1fr 1fr 1fr;
  }

  /* Tablet portrait / phone */
  @media (max-width: 720px) {
    .app { padding: 8px; gap: 8px; }
    .display { padding: 12px 16px; flex-basis: 18%; border-radius: 16px; }
    .phrases { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .phrase-btn { min-height: 50px; padding: 10px 4px; }
    .phrase-btn.wide { grid-column: span 3; }
    .keyboard { gap: 6px; }
    .key-row { gap: 6px; }
    .key { min-height: 46px; border-radius: 12px; }
    .key.bilingual { font-size: 0.85rem; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .display { flex-basis: 18%; }
    .phrase-btn { min-height: 40px; padding: 6px 4px; }
    .key { min-height: 36px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="display">
    <div class="display-label">目前訊息 CURRENT MESSAGE</div>
    <div class="display-text empty" id="display">Dear Cory, want to say something?</div>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="keyboard" id="keyboard">
    <div class="key-row" data-letters="ABCDEF"></div>
    <div class="key-row" data-letters="GHIJKL"></div>
    <div class="key-row" data-letters="MNOPQR"></div>
    <div class="key-row" data-letters="STUVWX"></div>
    <div class="key-row r5" data-letters="YZ"></div>
  </div>
</div>

<script>
  const phrases = [
    { text: "Never mind…" },
    { text: "but" },
    { text: "because" },
    { text: "it's fine" },
    { text: "teacher" },
    { text: "class" },
    { text: "I want to", wide: true, starter: true },
    { text: "Speak" },
    { text: "Eat" },
    { text: "Walk" },
    { text: "I miss…", starter: true }
  ];

  const display = document.getElementById("display");
  const phrasesEl = document.getElementById("phrases");
  const PLACEHOLDER = "Dear Cory, want to say something?";

  let text = "";

  function render() {
    if (text === "") {
      display.textContent = PLACEHOLDER;
      display.classList.add("empty");
    } else {
      display.textContent = text;
      display.classList.remove("empty");
    }
  }

  function flashPress(el) {
    el.classList.add("pressed");
    setTimeout(() => el.classList.remove("pressed"), 120);
  }

  function appendPhrase(value) {
    const needsSpace = text.length > 0 && !text.endsWith(" ") && !/^[.,!?…]/.test(value);
    text += (needsSpace ? " " : "") + value + " ";
    render();
  }
  function appendLetter(L) { text += L; render(); }
  function appendSpace() {
    if (!text.endsWith(" ") && text.length > 0) { text += " "; render(); }
  }
  function backspace() { text = text.slice(0, -1); render(); }
  function clearAll()  { text = ""; render(); }

  // Phrases
  phrases.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "phrase-btn" + (p.wide ? " wide" : "") + (p.starter ? " starter" : "");
    btn.type = "button";
    btn.textContent = p.text;
    btn.addEventListener("click", () => { flashPress(btn); appendPhrase(p.text); });
    phrasesEl.appendChild(btn);
  });

  // Letter rows
  document.querySelectorAll(".key-row").forEach(row => {
    row.dataset.letters.split("").forEach(L => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.type = "button";
      btn.textContent = L;
      btn.addEventListener("click", () => { flashPress(btn); appendLetter(L); });
      row.appendChild(btn);
    });
  });

  function makeCtrlKey(extraClass, zh, en, onClick, icon) {
    const btn = document.createElement("button");
    btn.className = "key bilingual " + extraClass;
    btn.type = "button";
    if (icon) { const i = document.createElement("span"); i.className = "icon"; i.textContent = icon; btn.appendChild(i); }
    if (zh)   { const z = document.createElement("span"); z.className = "zh";   z.textContent = zh;   btn.appendChild(z); }
    if (en)   { const e = document.createElement("span"); e.className = "en";   e.textContent = en;   btn.appendChild(e); }
    btn.addEventListener("click", () => { flashPress(btn); onClick(); });
    return btn;
  }

  const r5 = document.querySelector(".key-row.r5");
  const spaceBtn = makeCtrlKey("space",   "空白",   "Space", appendSpace);
  const speakBtn = makeCtrlKey("speak",   "唸出來", "Speak", speakText);
  const backBtn  = makeCtrlKey("back",    "",       "",      backspace, "⌫");
  const clearBtn = makeCtrlKey("clear-k", "清除",   "Clear", clearAll);
  r5.appendChild(spaceBtn);
  r5.appendChild(speakBtn);
  r5.appendChild(backBtn);
  r5.appendChild(clearBtn);

  function speakText() {
    if (!text.trim()) return;
    if (!("speechSynthesis" in window)) { alert("此瀏覽器不支援語音播放"); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const en = voices.find(v => /^en/i.test(v.lang));
    if (en) u.voice = en;
    u.rate = 0.9; u.pitch = 1;
    u.onstart = () => speakBtn.classList.add("playing");
    u.onend   = () => speakBtn.classList.remove("playing");
    u.onerror = () => speakBtn.classList.remove("playing");
    window.speechSynthesis.speak(u);
  }
  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
    window.speechSynthesis.getVoices();
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Backspace") { e.preventDefault(); backBtn.click(); return; }
    if (e.key === "Escape")    { clearBtn.click(); return; }
    if (e.key === " ")         { e.preventDefault(); spaceBtn.click(); return; }
    if (/^[a-zA-Z]$/.test(e.key)) {
      const L = e.key.toUpperCase();
      const btn = [...document.querySelectorAll(".key-row .key")].find(b => b.textContent === L);
      if (btn) btn.click();
    }
  });

  render();
</script>
</body>
</html>
