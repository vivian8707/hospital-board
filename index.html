<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hospital Communication Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #f5f7fa;
    color: #1a202c;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    padding: 12px;
    gap: 12px;
  }

  /* Display area */
  .display {
    flex: 1 1 auto;
    min-height: 30vh;
    background: #fff;
    border: 2px solid #e2e8f0;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .display-text {
    width: 100%;
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 700;
    line-height: 1.2;
    word-break: break-word;
    color: #1a202c;
    white-space: pre-wrap;
  }

  .display-text.empty {
    color: #cbd5e0;
    font-weight: 500;
    font-size: clamp(1.25rem, 3.5vw, 2rem);
  }

  .clear-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 50%;
    background: #fed7d7;
    color: #c53030;
    font-size: 1.4rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.15s;
  }

  .clear-btn:active { transform: scale(0.9); background: #fc8181; color: #fff; }

  .backspace-btn {
    position: absolute;
    top: 12px;
    right: 64px;
    height: 44px;
    padding: 0 14px;
    border: none;
    border-radius: 22px;
    background: #edf2f7;
    color: #2d3748;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
  }

  .backspace-btn:active { transform: scale(0.95); background: #cbd5e0; }

  /* Phrases */
  .phrases {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .phrase-btn {
    padding: 14px 8px;
    border: 2px solid #bee3f8;
    border-radius: 12px;
    background: #ebf8ff;
    color: #2c5282;
    font-size: clamp(0.85rem, 1.8vw, 1.1rem);
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    min-height: 56px;
    line-height: 1.2;
  }

  .phrase-btn:active { transform: scale(0.96); background: #90cdf4; color: #fff; }

  /* Keyboard */
  .keyboard {
    display: grid;
    grid-template-columns: repeat(13, 1fr);
    gap: 6px;
  }

  .key {
    aspect-ratio: 1 / 1.1;
    border: 2px solid #cbd5e0;
    border-radius: 10px;
    background: #fff;
    color: #2d3748;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.05s, background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .key:active { transform: scale(0.92); background: #4299e1; color: #fff; border-color: #4299e1; }

  .key.space {
    grid-column: span 4;
    aspect-ratio: auto;
    background: #f7fafc;
  }

  /* Tablet / smaller screens */
  @media (max-width: 720px) {
    .phrases { grid-template-columns: repeat(2, 1fr); }
    .keyboard { grid-template-columns: repeat(7, 1fr); }
    .key.space { grid-column: span 3; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .app { padding: 8px; gap: 8px; }
    .display { min-height: 22vh; padding: 12px; }
    .phrase-btn { min-height: 44px; padding: 8px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="display">
    <button class="backspace-btn" id="backspace" aria-label="刪除一個字">⌫</button>
    <button class="clear-btn" id="clear" aria-label="清除全部">×</button>
    <div class="display-text empty" id="display">點選下方按鈕開始</div>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="keyboard" id="keyboard"></div>
</div>

<script>
  const phrases = [
    "Never mind…",
    "but",
    "because",
    "it's fine",
    "teacher",
    "class",
    "I want to eat",
    "I want to speak",
    "I want to walk",
    "I miss…"
  ];

  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

  const display = document.getElementById("display");
  const phrasesEl = document.getElementById("phrases");
  const keyboardEl = document.getElementById("keyboard");

  let text = "";

  function render() {
    if (text === "") {
      display.textContent = "點選下方按鈕開始";
      display.classList.add("empty");
    } else {
      display.textContent = text;
      display.classList.remove("empty");
    }
  }

  function append(value, spaceAfter) {
    const needsSpace = text.length > 0 && !text.endsWith(" ") && !/^[.,!?…]/.test(value);
    text += (needsSpace ? " " : "") + value + (spaceAfter ? " " : "");
    render();
  }

  phrases.forEach(p => {
    const btn = document.createElement("button");
    btn.className = "phrase-btn";
    btn.textContent = p;
    btn.addEventListener("click", () => append(p, true));
    phrasesEl.appendChild(btn);
  });

  letters.forEach(L => {
    const btn = document.createElement("button");
    btn.className = "key";
    btn.textContent = L;
    btn.addEventListener("click", () => {
      text += L;
      render();
    });
    keyboardEl.appendChild(btn);
  });

  const space = document.createElement("button");
  space.className = "key space";
  space.textContent = "␣ Space";
  space.addEventListener("click", () => {
    if (!text.endsWith(" ") && text.length > 0) {
      text += " ";
      render();
    }
  });
  keyboardEl.appendChild(space);

  document.getElementById("clear").addEventListener("click", () => {
    text = "";
    render();
  });

  document.getElementById("backspace").addEventListener("click", () => {
    text = text.slice(0, -1);
    render();
  });

  render();
</script>
</body>
</html>
